name: Dependency Review

# NOTE: actions/dependency-review-action requires the repository's Dependency
# Graph to be enabled (Settings → Code security → Dependency graph). Until that
# is on, the action fails with "Dependency review is not supported on this
# repository". The job is marked continue-on-error so a disabled graph cannot
# block PRs; once Dependency graph is enabled, remove continue-on-error to make
# this a hard gate again.

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v5
