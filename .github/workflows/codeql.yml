name: CodeQL

# NOTE: CodeQL has no PHP analyzer, so it cannot scan this library's source.
# It DOES support the "actions" language (security analysis of the workflow
# files themselves), which is what this job runs. The previous "languages: php"
# configuration failed every run with "Did not recognize the following
# languages: php".

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
